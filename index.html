<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTC Test</title>
</head>
<body>
  <h2>Auth Test</h2>
  <button onclick="testAuth()">Test Connection</button>
  <p id="result">Not tested yet</p>
  <script>
    const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_DEPLOYMENT_URL';
    function testAuth() {
      document.getElementById('result').textContent = 'Testing...';
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        credentials: 'include'
      })
      .then(r => r.json())
      .then(data => {
        document.getElementById('result').textContent = JSON.stringify(data);
      })
      .catch(err => {
        document.getElementById('result').textContent = 'Error: ' + err.message;
      });
    }
  </script>
</body>
</html>
