<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTC Test</title>
</head>
<body>
  <h2>Auth Test</h2>
  <button onclick="testAuth()">Test Connection</button>
  <p id="result">Not tested yet</p>
  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhKPrjrG3c7y-rsd3Zsi_VdxR2xAmfUojY72MluXxpNpMmweYbvrm6ECyXJiCVoQsN8g/exec';
    
    function testAuth() {
      document.getElementById('result').textContent = 'Testing...';
      const script = document.createElement('script');
      script.src = APPS_SCRIPT_URL + '?callback=handleResponse&action=authTest';
      script.onerror = () => {
        document.getElementById('result').textContent = 'Script load error';
      };
      document.body.appendChild(script);
    }
    
    function handleResponse(data) {
      document.getElementById('result').textContent = JSON.stringify(data);
    }
  </script>
</body>
</html>
